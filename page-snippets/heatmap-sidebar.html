<div id="sb-heatmap" style="display:none">
  <div class="sb-section">
    <button class="sb-toggle" onclick="toggleSB('sbl-hm-filter',this)">
      <span class="sb-label">Filter</span>
      <svg class="sb-chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="sb-list" id="sbl-hm-filter">
      <button class="sb-link active">All Procedures</button>
      <button class="sb-link">By Category</button>
      <button class="sb-link">By PGY Year</button>
    </div>
  </div>
  <div class="sb-section">
    <button class="sb-toggle" onclick="toggleSB('sbl-hm-legend',this)">
      <span class="sb-label">Legend</span>
      <svg class="sb-chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="sb-list" id="sbl-hm-legend">
      <div style="padding:6px 14px;font-size:13px;color:var(--text-2);">Outer: EPA Score</div>
      <div style="padding:6px 14px;font-size:13px;color:var(--text-2);">Inner dot: Autonomy</div>
    </div>
  </div>
  <div class="sb-section">
    <button class="sb-toggle" onclick="toggleSB('sbl-hm-compare',this)">
      <span class="sb-label">Compare</span>
      <svg class="sb-chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="sb-list" id="sbl-hm-compare">
      <button class="sb-link active">My cohort</button>
      <button class="sb-link">National avg</button>
    </div>
  </div>
</div>
