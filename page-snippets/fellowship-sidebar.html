<div id="sb-fellowship" style="display:none">
  <div class="sb-section">
    <button class="sb-toggle" onclick="toggleSB('sbl-fellowship-goal',this)">
      <span class="sb-label">Fellowship Goal</span>
      <svg class="sb-chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="sb-list" id="sbl-fellowship-goal">
      <button class="sb-link active">HPB Surgery</button>
      <div style="padding:4px 14px 12px;font-size:12px;color:var(--text-3);cursor:pointer;">Change goal</div>
    </div>
  </div>
  <div class="sb-section">
    <button class="sb-toggle" onclick="toggleSB('sbl-matched',this)">
      <span class="sb-label">Matched Fellows</span>
      <svg class="sb-chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="sb-list" id="sbl-matched">
      <div style="padding:4px 14px;font-size:13px;color:var(--text-2);">Avg. biliary: <span style="color:var(--text-1);font-weight:500;">68</span></div>
      <div style="padding:4px 14px;font-size:13px;color:var(--text-2);">Avg. publications: <span style="color:var(--text-1);font-weight:500;">2.1</span></div>
      <div style="padding:4px 14px;font-size:13px;color:var(--text-2);">Avg. presentations: <span style="color:var(--text-1);font-weight:500;">1.0</span></div>
      <div style="padding:4px 14px;font-size:13px;color:var(--text-2);">Match rate: <span style="color:var(--ac-green);font-weight:500;">71%</span></div>
    </div>
  </div>
  <div class="sb-section">
    <button class="sb-toggle" onclick="toggleSB('sbl-societies',this)">
      <span class="sb-label">Societies</span>
      <svg class="sb-chev open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="sb-list" id="sbl-societies">
      <button class="sb-link">AHPBA</button>
      <button class="sb-link">SSAT</button>
      <button class="sb-link">ACS</button>
    </div>
  </div>
</div>
