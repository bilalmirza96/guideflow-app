<!-- VOICE DICTATION MODAL -->
<div class="modal-backdrop" id="dictation-backdrop" style="display:none" onclick="closeDictation(false)"></div>
<div class="modal-card" id="dictation-modal" style="display:none">
  <div class="modal-content">
    <!-- Pulsing red dot indicator -->
    <div class="listening-indicator">
      <div class="pulse-dot"></div>
      <span class="listening-text">Listening...</span>
    </div>

    <!-- Subtitle -->
    <p class="modal-subtitle">Speak your case details...</p>

    <!-- Button group -->
    <div class="modal-button-group">
      <button class="btn-primary" onclick="closeDictation(true)">Done</button>
      <button class="btn-ghost" onclick="closeDictation(false)">Cancel</button>
    </div>
  </div>
</div>

<!-- POST-SUBMISSION EPA MODAL -->
<div class="modal-backdrop" id="epa-backdrop" style="display:none" onclick="closeEpaModal(false)"></div>
<div class="modal-card" id="epa-modal" style="display:none">
  <div class="modal-content">
    <!-- Title -->
    <h2 class="modal-title">Request EPA Assessment?</h2>
    
    <!-- Subtitle -->
    <p class="modal-subtitle">Send a feedback request to your attending for this case</p>

    <!-- Case summary row -->
    <div class="epa-case-summary">
      <div class="case-summary-left">
        <span class="case-procedure-name" id="epa-procedure-name"></span>
        <span class="role-badge" id="epa-role-badge"></span>
      </div>
      <span class="case-summary-date" id="epa-case-date"></span>
    </div>

    <!-- EPA suggestion -->
    <div class="epa-suggestion">
      <span class="epa-dot"></span>
      <span class="epa-suggestion-text" id="epa-suggestion-text">Suggested: EPA-1 — Inguinal Hernia Repair</span>
    </div>

    <!-- Button group (side by side) -->
    <div class="epa-button-group">
      <button class="btn-primary" onclick="closeEpaModal(true)">Send Request</button>
      <button class="btn-ghost" onclick="closeEpaModal(false)">Skip</button>
    </div>
  </div>
</div>
